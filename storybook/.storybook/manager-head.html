<style>
  /* Hide sidebar type icons on story/document levels — root and component keep their icons */
  /* [data-nodetype]:not([data-nodetype="root"]):not([data-nodetype="component"]):not([data-nodetype="group"]) svg:first-of-type {
    display: none;
  } */
  [data-nodetype="group"] svg:first-of-type,
  [data-nodetype="component"] svg:first-of-type {
    display: none;
  }

  /* Component node: nudge the arrow icon down slightly for visual alignment */
  [data-nodetype="component"] > button > div {
    margin-top: 6px;
  }

  /* Component node: hide the component type icon */
  /* [type="component"] {
    display: none;
  } */

  /* Root and component nodes: restore the collapse indicator SVG */
  [data-nodetype="root"] [data-action="collapse-root"] svg,
  [data-nodetype="component"] [data-action="collapse-root"] svg {
    display: block;
    transition: transform 0.15s ease-out;
  }

  /* Closed: chevron points right → (SVG is naturally right-pointing, no extra rotation) */
  [data-nodetype="root"] [data-action="collapse-root"][aria-expanded="false"] svg,
  [data-nodetype="component"] [data-action="collapse-root"][aria-expanded="false"] svg {
    transform: rotateZ(0deg);
  }

  /* Open: CollapseIconWrapper already applies rotateZ(90deg) on the parent div,
     keep SVG at 0° so the combined result is 90° → arrow points down */
  [data-nodetype="root"] [data-action="collapse-root"][aria-expanded="true"] svg,
  [data-nodetype="component"] [data-action="collapse-root"][aria-expanded="true"] svg {
    transform: none;
  }
</style>
